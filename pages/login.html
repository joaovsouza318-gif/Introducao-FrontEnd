<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Minha Loja</title>
    <link rel="stylesheet" href="../css/pagina.css">
    
    <style>
        #login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 90px - 150px); /* Desconta o cabeçalho e rodapé aproximados */
            padding: 40px 20px;
        }

        .login-card {
            background: #242424; /* Mesmo fundo dos seus cards */
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,.4);
        }

        .login-card h2 {
            font-size: 28px;
            color: #00bfff; /* Tom de azul do seu CSS */
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-grupo {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-grupo label {
            font-size: 15px;
            color: #ccc;
            font-weight: 600;
        }

        /* Reaproveitando o estilo que você usou na barra de pesquisa */
        .form-control {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: #2b2b2b;
            color: white;
            transition: .3s;
        }

        .form-control:focus {
            box-shadow: 0 0 15px #00bfff;
        }

        .login-opcoes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .login-opcoes a:hover {
            color: #00bfff;
            text-decoration: underline;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #ccc;
        }

        /* Rodapé interno do card para criar conta */
        .login-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 15px;
            color: #ccc;
        }

        .login-footer a {
            color: #00bfff;
            font-weight: bold;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="geral">
        
        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html">
                    <img src="../assets/icones/logo.png" alt="Logo da Loja">
                </a>
            </div>
            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="linkMenu">Home</a></li>
                    <li><a href="produtos.html" class="linkMenu">Produtos</a></li>
                    <li><a href="carrinho.html" class="linkMenu">Carrinho</a></li>
                </ul>
            </nav>
            <div id="div-icones">
                <ul>
                    <li><a href="login.html"><img src="../assets/icones/login.png" alt="Perfil"></a></li>
                </ul>
            </div>
        </header>

        <main id="login-container">
            <div class="login-card">
                <h2>Acessar Conta</h2>
                
                <form action="#" method="POST">
                    <div class="form-grupo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail" required>
                    </div>

                    <div class="form-grupo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required>
                    </div>

                    <div class="login-opcoes">
                        <label class="checkbox-container">
                            <input type="checkbox"> Lembrar-me
                        </label>
                        <a href="#">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-card">Entrar</button>
                </form>

                <div class="login-footer">
                    Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
                </div>
            </div>
        </main>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>© 2026 Minha Loja Virtual</h2>
                <h1>Sua Loja Geek / Tech</h1>
            </div>
            
            <div id="div-cartoes">
                <span style="color: #ccc; font-size: 14px;">Ambiente 100% Seguro</span>
            </div>
        </footer>

    </div>

</body>
</html>
