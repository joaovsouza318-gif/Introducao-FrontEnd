<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual - Carrinho</title>

    <link rel="stylesheet" href="../css/pagina.css">
    <link rel="shortcut icon" href="../assets/icones/logo.png" type="image/x-icon">
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html"> <img src="../assets/icones/logo.png" alt="logo"> </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="linkMenu">Home</a></li>
                    <li><a href="cadastro.html" class="linkMenu">Cadastro</a></li>
                    <li><a href="sobre.html" class="linkMenu">Sobre</a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="login.html" class="linkIcone"><img src="../assets/icones/login.png" alt="login button"></a></li>
                    <li><a href="carrinho.html" class="linkIcone"><img src="../assets/icones/carrinho.png" alt="cart button"></a></li>
                </ul>
            </div>
        </header>

        <div id="carrinho-container">
            
            <section id="itens-carrinho">
                <h2>Seu Carrinho</h2>
                
                <div class="item-carrinho-horizontal">
                    <img src="../assets/jogos/spiderMiles.jpg" alt="Spider Man Miles Morales" class="img-pequena-carrinho">
                    
                    <div class="info-carrinho-horizontal">
                        <h2 class="title-card">Spider Man Miles Morales</h2>
                        <h3 class="value-card">R$ 259,90</h3>
                        
                        <div class="quantidade-container">
                            <button class="btn-qtd">-</button>
                            <input type="number" value="1" min="1" class="input-qtd">
                            <button class="btn-qtd">+</button>
                        </div>
                    </div>
                    
                    <button class="btn-remover">Remover</button>
                </div>

                <div class="item-carrinho-horizontal">
                    <img src="../assets/jogos/granTurismo.jpg" alt="Gran Turismo 7" class="img-pequena-carrinho">
                    
                    <div class="info-carrinho-horizontal">
                        <h2 class="title-card">Gran Turismo 7</h2>
                        <h3 class="value-card">R$ 349,90</h3>
                        
                        <div class="quantidade-container">
                            <button class="btn-qtd">-</button>
                            <input type="number" value="2" min="1" class="input-qtd">
                            <button class="btn-qtd">+</button>
                        </div>
                    </div>
                    
                    <button class="btn-remover">Remover</button>
                </div>

                <div class="item-carrinho-horizontal">
                    <img src="../assets/jogos/monsterHunter.jpg" alt="Monster Hunter World" class="img-pequena-carrinho">
                    
                    <div class="info-carrinho-horizontal">
                        <h2 class="title-card">Monster Hunter World</h2>
                        <h3 class="value-card">R$ 110,00</h3>
                        
                        <div class="quantidade-container">
                            <button class="btn-qtd">-</button>
                            <input type="number" value="1" min="1" class="input-qtd">
                            <button class="btn-qtd">+</button>
                        </div>
                    </div>
                    
                    <button class="btn-remover">Remover</button>
                </div>
            </section>

            <div id="resumo-carrinho">
                <h2>Resumo do Pedido</h2>
                
                <div class="resumo-linha">
                    <span>Digite seu CEP:</span>
                    <input type="text" id="cep" name="cep" placeholder="">
                </div>

                <div class="resumo-linha">
                    <span>Subtotal (3 itens):</span>
                    <span>R$ 818,80</span>
                </div>
                
                <div class="resumo-linha">
                    <span>Frete:</span>
                    <span>R$ 00,00</span>
                </div>
                
                <hr class="divisor-resumo">
                
                <div class="resumo-linha total">
                    <span>Total:</span>
                    <span>R$ 818,80</span>
                </div>
                
                <button class="btn-pagamento">Ir para o Pagamento</button>
            </div>

        </div>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua TheGoatGames, 6777 - Bairro Europa</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li><a href="https://instagram.com/el_tabosa" target="_blank"><img src="../assets/icones/instagram.png" alt="instagram"></a></li>
                    <li><a href="https://X.com/el_tabosa" target="_blank"><img src="../assets/icones/X.jpg" alt="X"></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../assets/icones/hipercard.png" alt="HiperCard">
                <img src="../assets/icones/visa.png" alt="Visa">
                <img src="../assets/icones/master_card.png" alt="MasterCard">
            </div>
        </footer>
    </main>
    <script src="../js/carrinho.js"></script>
</body>

</html>
