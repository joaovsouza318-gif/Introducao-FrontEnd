<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual - Cadastro de Produtos</title>

    <link rel="stylesheet" href="../css/pagina.css">
    <link rel="shortcut icon" href="../assets/icones/logo.png" type="image/x-icon">
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html"> <img src="../assets/icones/logo.png" alt="logo"> </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="index.html" class="linkMenu">Home</a></li>
                    <li><a href="cadastro.html" class="linkMenu">Cadastro</a></li>
                    <li><a href="sobre.html" class="linkMenu">Sobre</a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="login.html" class="linkIcone"><img src="../assets/icones/login.png" alt="login button"></a></li>
                    <li><a href="carrinho.html" class="linkIcone"><img src="../assets/icones/carrinho.png" alt="cart button"></a></li>
                </ul>
            </div>
        </header>

        <div id="carrinho-container" style="display: flex; justify-content: center; padding: 40px 20px;">
            <div style="background-color: #2b2b2b; padding: 30px; border-radius: 8px; width: 100%; max-width: 500px; color: white; box-shadow: 0px 4px 10px rgba(0,0,0,0.3);">
                <h2 style="margin-bottom: 20px; text-align: center; color: #ffcc00;">Cadastrar Novo Jogo</h2>
                
                <form id="form-produto" style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="titulo" style="font-weight: bold;">Título do Jogo:</label>
                        <input type="text" id="titulo" placeholder="Ex: Resident Evil 4" required style="padding: 10px; border-radius: 4px; border: none;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="preco" style="font-weight: bold;">Preço (R$):</label>
                        <input type="number" id="preco" step="0.01" min="0" placeholder="Ex: 199.90" required style="padding: 10px; border-radius: 4px; border: none;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="imagem" style="font-weight: bold;">URL/Caminho da Imagem:</label>
                        <input type="text" id="imagem" placeholder="Ex: ../assets/jogos/nome.jpg" required style="padding: 10px; border-radius: 4px; border: none;">
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button type="submit" style="flex: 1; padding: 12px; background-color: #ffcc00; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: black;">Cadastrar Jogo</button>
                        <button type="reset" style="flex: 1; padding: 12px; background-color: #555; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: white;">Limpar</button>
                    </div>
                </form>
            </div>
        </div>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua TheGoatGames, 6777 - Bairro Europa</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li><a href="https://instagram.com/el_tabosa" target="_blank"><img src="../assets/icones/instagram.png" alt="instagram"></a></li>
                    <li><a href="https://X.com/el_tabosa" target="_blank"><img src="../assets/icones/X.jpg" alt="X"></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../assets/icones/hipercard.png" alt="HiperCard">
                <img src="../assets/icones/visa.png" alt="Visa">
                <img src="../assets/icones/master_card.png" alt="MasterCard">
            </div>
        </footer>
    </main>

    <script src="../js/cadastro.js"></script>
</body>

</html>
