<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual</title>

    <link rel="stylesheet" href="../css/pagina.css">
    <link rel="shortcut icon" href="../assets/icones/favicon.ico" type="image/x-icon">
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html"> <img src="../assets/icones/logo.png" alt="logo"> </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="index.html" class="linkMenu">Home</a></li>
                    <li><a href="cadastro.html" class="linkMenu">Cadastro</a></li>
                    <li><a href="sobre.html" class="linkMenu">Sobre</a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="login.html" class="linkIcone"><img src="../assets/icones/login.png" alt="login button"></a></li>
                    <li><a href="carrinho.html" class="linkIcone"><img src="../assets/icones/carrinho.png" alt="cart button"></a></li>

                </ul>
            </div>
        </header>

        <section id="Pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu Produto: ">
        </section>

        <section id="cards">

            <div class="card">
                <img src="../assets/jogos/astroGoty.jpg" alt="jogo1" class="img-card">
                <h2 class="title-card"> Astro Bot </h2>
                <h3 class="value-card">R$ 339,90</h3>

                <button class="btn-card">Adicionar ao Carrinho</button>
            </div>

            <div class="card">
                <img src="../assets/jogos/baldursGate.jpg" alt="jogo2" class="img-card">
                <h2 class="title-card"> Baldurs Gate III </h2>
                <h3 class="value-card">R$ 359,90</h3>

                <button class="btn-card">Adicionar ao Carrinho</button>
            </div>

            <div class="card">
                <img src="../assets/jogos/boruto.jpg" alt="jogo3" class="img-card">
                <h2 class="title-card"> Naruto Ultimate Ninja Storm IV </h2>
                <h3 class="value-card">R$ 239,90</h3>

                <button class="btn-card">Adicionar ao Carrinho</button>
            </div>

            <div class="card">
                <img src="../assets/jogos/codWf.jpg" alt="jogo4" class="img-card">
                <h2 class="title-card"> Call of Duty Modern Warfare </h2>
                <h3 class="value-card">R$ 319,90</h3>

                <button class="btn-card">Adicionar ao Carrinho</button>
            </div>

            <div class="card">
                <img src="../assets/jogos/eldenRing.jpg" alt="jogo5" class="img-card">
                <h2 class="title-card"> Elden Ring </h2>
                <h3 class="value-card">R$ 249,90</h3>

                <button class="btn-card">Adicionar ao Carrinho</button>
            </div>
        </section>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua TheGoatGames, 6777 - Bairro Europa</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li><a href="https://www.instagram.com/el_tabosa/"><img src="../assets/icones/instagram.png" alt="instagram"></a></li>
                    <li><a href="https://x.com/el_tabosa"><img src="../assets/icones/X.jpg" alt="x"></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../assets/icones/hipercard.png" alt="HiperCard">
                <img src="../assets/icones/visa.png" alt="Visa">
                <img src="../assets/icones/master_card.png" alt="MasterCard">
            </div>
        </footer>

    </main>
    <script src="../js/index.js"></script>
</body>
</html>
